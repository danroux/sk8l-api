name: helm-chart
on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Chart version number'
        required: true
        default: '-alpha'
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

jobs:
  release-chart:
    runs-on: ubuntu-latest
    env:
      GITHUB_CHART_VERSION: ${{ github.event.pull_request.number || github.event.inputs.chart_version || '' }}
    steps:
      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: 'v3.13.3'
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: package-app
        run: |
          set -e
          IMAGE_TAG=$(make chart-version-wo)
          echo "IMAGE_TAG=$IMAGE_TAG"
          helm package --version "$IMAGE_TAG" charts/sk8l
          mkdir -p charts/repo
          mv sk8l*tgz charts/repo
          helm repo index charts/repo --url https://sk8l.io/charts
      - name: Push Helm chart
        run: |
          IMAGE_TAG=$(make chart-version-wo)
          file charts/repo/sk8l-$IMAGE_TAG.tgz
          make helm-push
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: charts-repo
          path: charts/repo
          retention-days: 1
